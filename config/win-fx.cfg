# Win animation runtime configuration
# Duration (in ms) that the win text overlay remains visible.
# Increasing this keeps the text on screen longer but does not significantly
# affect performance compared to particle count tuning below.
winFx.textDisplayDurationMs=2000

# Maximum total number of active particles across all win effects.
# NOTE: This value is intentionally high compared to earlier presets
# (~232 effective particles). On lower-end devices, consider reducing this
# (e.g., 500–2000) to improve performance and battery usage.
winFx.maxParticles=10000
winFx.particleDelayJitterMs=100
winFx.centerFinaleDelayMs=100
winFx.centerFinaleWaves=1
winFx.centerFinaleWaveDelayMs=0
winFx.centerFinaleCount=50
winFx.confettiRainDelayMs=1000
winFx.confettiRainCount=50
winFx.confettiRainSpreadMs=500
winFx.fireworkBursts=30

# Comma-separated values
# Colors: sky-blue, purple, coral-pink, lime-green, yellow, orange, magenta
winFx.colors=#26ccff,#a25afd,#ff5e7e,#88ff5a,#fcff42,#ffa62d,#ff36ff
winFx.textOptions=YOU WIN!,LEGENDARY!,EPIC CLEAR!,MEMORY MASTER!
# Rain colors: sky-blue, purple, coral-pink, lime-green, yellow, orange, magenta, dark-brick, dark-mahogany, dark-wine, dark-walnut
winFx.rainColors=#26ccff,#a25afd,#ff5e7e,#88ff5a,#fcff42,#ffa62d,#ff36ff,#6b1a10,#4b170f,#2f1218,#3a2416
